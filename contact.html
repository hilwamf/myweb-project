                If you are interested in collaborating, working together,
                or simply sharing experiences and ideas, feel free to send
                me a message or connect with me through my social media.
            </p>

            <h3>Connect with me:</h3>

            <div class="social-links">
                <a href="#">GitHub</a>
                <a href="#">LinkedIn</a>
                <a href="#">Instagram</a>
